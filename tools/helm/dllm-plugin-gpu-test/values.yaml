job:
  ttlSecondsAfterFinished: 600
  backoffLimit: 0

image:
  repository: pytorch/pytorch
  tag: 2.6.0-cuda12.4-cudnn9-devel
  pullPolicy: IfNotPresent

git:
  repoUrl: https://github.com/vllm-project/dllm-plugin.git
  branch: main

gpu:
  count: 1

# Pytest targets (GPU job): mock-stack smoke, MRV2 subclass + structured-output regex,
# and two-phase contract imports (needs ``--extra vllm``).
tests:
  # After pytest, run OpenAI HTTP smoke (``vllm serve`` + curl); requires GPU.
  runServeHttpSmoke: true
  # One ``uv run pytest`` per entry so each GPU LLM runs in a fresh Python process
  # (avoids CUDA illegal access on back-to-back inits in the same interpreter).
  pytestPaths:
    - tests/test_engine_core_draft_hook_patch.py
    - tests/test_runtime_scheduler_draft_output.py
    # Run GPU semantics before the heavier mock-stack LLM test to reduce flaky
    # cross-process CUDA issues on shared long Job chains.
    - tests/test_dllm_gpu_integration_semantics.py
    - tests/test_vllm_mock_integration.py
    - tests/test_vllm_gpu_mrv2_monkeypatch_grammar.py::test_gpu_injects_dllm_mrv2_via_monkeypatch_stock_worker
    - tests/test_vllm_gpu_mrv2_monkeypatch_grammar.py::test_gpu_dllm_stack_structured_output_regex_grammar
    - tests/test_vllm_gpu_mrv2_monkeypatch_grammar.py::test_gpu_runtime_adapters_strict_stack_regex_structured_output
    - tests/test_two_phase_dllm.py

# Cluster GPU pool: match dedicated GPU node taints (see README).
# The jounce.io L4 pool uses this alongside the standard nvidia.com/gpu taint
# (the Job template always includes the nvidia.com/gpu toleration).
scheduling:
  nodeSelector: {}
  extraTolerations:
    - key: jounce.io/nodetype
      operator: Equal
      value: L4
      effect: NoSchedule

resources:
  cpu: "6"
  memory: 24Gi
  ephemeralStorage: 40Gi

# Extra env for pytest (see ``tests/gpu_memory.py``).
# Default targets dedicated pool nodes (e.g. GKE L4); override down for tiny GPUs.
testEnv:
  DLLM_TEST_GPU_MEMORY_UTILIZATION: "0.45"
  DLLM_TEST_KV_CACHE_MEMORY_BYTES: "none"
